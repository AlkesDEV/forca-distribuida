services:
  # ─── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: forca-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --loglevel notice
    volumes:
      - redis_data:/data
    networks:
      - forca-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend instance 1 ───────────────────────────────────────────────
  backend-1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forca-backend-1
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
      SERVER_ID: backend-1
      PORT: 3000
      RAILS_MAX_THREADS: 10
      SECRET_KEY_BASE: "changeme_in_production_use_a_long_random_string_1"
    volumes:
      - ./palavras.txt:/palavras.txt:ro
      - backend1_logs:/app/log
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - forca-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend instance 2 ───────────────────────────────────────────────
  backend-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forca-backend-2
    restart: unless-stopped
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
      SERVER_ID: backend-2
      PORT: 3000
      RAILS_MAX_THREADS: 10
      SECRET_KEY_BASE: "changeme_in_production_use_a_long_random_string_1"
    volumes:
      - ./palavras.txt:/palavras.txt:ro
      - backend2_logs:/app/log
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - forca-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/v1/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Frontend React ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CABLE_URL: ws://localhost/cable
    container_name: forca-frontend
    restart: unless-stopped
    networks:
      - forca-net
    depends_on:
      - backend-1
      - backend-2
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Nginx (load balancer + reverse proxy) ────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: forca-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - forca-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  forca-net:
    driver: bridge

volumes:
  redis_data:
  backend1_logs:
  backend2_logs:
